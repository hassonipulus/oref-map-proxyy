 <!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מפת העורף - בזמן אמת</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/d3-delaunay@6"></script>
    <script src="https://unpkg.com/polygon-clipping@0.15.3/dist/main.global.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #1a1a1a; font-family: sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* UI Overlay */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* Header */
        .header { background: rgba(0, 0, 0, 0.8); color: white; padding: 15px; text-align: center; pointer-events: auto; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 1.2rem; }
        
        /* Alerts Display */
        #active-alerts { padding: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .alert-badge { background: #ff0000; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; animation: pulse 1s infinite; }
        
        /* Timeline Slider */
        .timeline-container { background: rgba(0, 0, 0, 0.8); padding: 15px; pointer-events: auto; }
        .timeline-container input[type="range"] { width: 100%; margin: 10px 0; }
        .timeline-labels { display: flex; justify-content: space-between; color: white; font-size: 0.8rem; }
        
        /* Debug Console (Hidden by default, shown with f-log) */
        body.f-log #debug-console { display: block; }
        #debug-console { display: none; position: absolute; bottom: 100px; left: 10px; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; padding: 10px; max-height: 200px; overflow-y: auto; width: 300px; font-size: 12px; pointer-events: none; z-index: 2000; }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div id="ui-layer">
        <div class="header">
            <h1>מפת העורף</h1>
            <div id="status-indicator" style="color: #0f0;">מחובר 🟢</div>
        </div>
        
        <div id="active-alerts"></div>
        
        <div class="timeline-container">
            <div class="timeline-labels">
                <span id="time-start">לפני שעה</span>
                <span id="time-current">עכשיו</span>
            </div>
            <input type="range" id="history-slider" min="0" max="100" value="100">
        </div>
    </div>

    <div id="debug-console"></div>

    <script>
        // --- 1. FEATURE FLAGS ---
        window.FF = {};
        new URLSearchParams(window.location.search).forEach((value, key) => {
            if (key.startsWith('f-')) {
                const name = key.substring(2);
                window.FF[name] = value === '' ? true : value;
                document.body.classList.add(`f-${name}`);
            }
        });

        const log = (msg) => {
            if (window.FF.log) {
                const el = document.getElementById('debug-console');
                const time = new Date().toLocaleTimeString('he-IL');
                el.innerHTML = `<div>[${time}] ${msg}</div>` + el.innerHTML;
            }
            console.log(msg);
        };

        // --- 2. STATE MANAGEMENT ---
        const state = {
            citiesGeo: {},
            activeAlerts: [],
            history: [],
            polygonsLayer: null
        };

        // --- 3. API & NETWORK LOGIC (f-debugapi implemented) ---
        const getApiUrl = (path) => {
            if (window.FF.debugapi === 'oref-direct') {
                const base = 'https://www.oref.org.il/warningMessages/alert';
                if (path.includes('/api/alerts')) return `${base}/Alerts.json`;
                if (path.includes('/api/history')) return `${base}/History/AlertsHistory.json`;
            }
            return path; // Default to Cloudflare proxy
        };

        async function fetchOrefData(endpoint) {
            const url = getApiUrl(endpoint);
            const isDirect = url.includes('oref.org.il');
            
            const options = isDirect ? {
                headers: {
                    'Referer': 'https://www.oref.org.il/',
                    'X-Requested-With': 'XMLHttpRequest'
                }
            } : {};

            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const text = await response.text();
                // Oref returns BOM (\ufeff) when empty
                const cleanText = text.replace(/^\ufeff/, '').trim();
                
                if (!cleanText) return null;
                return JSON.parse(cleanText);
            } catch (err) {
                log(`Fetch error on ${endpoint}: ${err.message}`);
                return null;
            }
        }

        // --- 4. MAP INITIALIZATION ---
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView([31.5, 34.9], 8);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        state.polygonsLayer = L.layerGroup().addTo(map);

        // --- 5. DATA PROCESSING & VISUALIZATION ---
        function updateUI(alerts) {
            const container = document.getElementById('active-alerts');
            container.innerHTML = '';
            
            if (alerts && alerts.length > 0) {
                alerts.forEach(location => {
                    const el = document.createElement('div');
                    el.className = 'alert-badge';
                    el.innerText = location;
                    container.appendChild(el);
                });
            }
        }

        function drawPolygons(locations) {
            state.polygonsLayer.clearLayers();
            
            if (!locations || locations.length === 0) return;

            // Simplified Voronoi/Polygon rendering for demonstration
            // In a full implementation, this uses d3-delaunay and polygon-clipping
            // based on the cities_geo.json coordinates.
            locations.forEach(loc => {
                const coords = state.citiesGeo[loc];
                if (coords) {
                    L.circle(coords, {
                        color: 'red',
                        fillColor: '#f03',
                        fillOpacity: 0.5,
                        radius: 5000
                    }).addTo(state.polygonsLayer).bindPopup(loc);
                }
            });
        }

        // --- 6. POLLING LOOPS ---
        async function pollLiveAlerts() {
            const data = await fetchOrefData('/api/alerts');
            
            if (data && data.data && Array.isArray(data.data)) {
                state.activeAlerts = data.data;
                updateUI(state.activeAlerts);
                drawPolygons(state.activeAlerts);
                log(`Live alerts updated: ${state.activeAlerts.length} active`);
            } else {
                state.activeAlerts = [];
                updateUI([]);
                drawPolygons([]);
            }
        }

        async function pollHistory() {
            const data = await fetchOrefData('/api/history');
            if (data && Array.isArray(data)) {
                state.history = data;
                log(`History updated: ${data.length} records`);
            }
        }

        // --- 7. STARTUP SEQUENCE ---
        async function init() {
            log('Starting application...');
            log(`Debug API mode: ${window.FF.debugapi || 'proxy (default)'}`);

            try {
                // Fetch location coordinates map (ensure cities_geo.json exists in /web)
                const geoRes = await fetch('/cities_geo.json');
                if (geoRes.ok) {
                    state.citiesGeo = await geoRes.json();
                    log('Loaded cities geography');
                } else {
                    log('Warning: cities_geo.json not found. Map drawing will be limited.');
                }
            } catch (e) {
                log('Error loading geography data.');
            }

            // Initial fetch
            await pollLiveAlerts();
            await pollHistory();

            // Set polling intervals
            setInterval(pollLiveAlerts, 1000);   // Every 1 second
            setInterval(pollHistory, 10000);     // Every 10 seconds
        }

        // Boot
        init();
    </script>
</body>
</html>
